name: GitHub Copilot Services CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: GitHub Copilot Services - Build and Test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.sha }}" -o github-copilot-svcs ./src

      - name: Run unit tests
        run: |
          go test ./src/... || true

  deploy:
    name: GitHub Copilot Services - Build, Publish, and Deploy
    runs-on: self-hosted
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DEPLOYMENT_REPO: x51vn/deployment
      DEPLOYMENT_REPO_PAT: ""
      IMAGE_VERSION: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Import host env var to Actions context
        run: |
          echo "DOCKER_REGISTRY_USER=$DOCKER_REGISTRY_USER" >> $GITHUB_ENV
          echo "DOCKER_REGISTRY_PASSWORD=$DOCKER_REGISTRY_PASSWORD" >> $GITHUB_ENV
          echo "DEPLOY_USER=$DEPLOY_SERVER2_USER" >> $GITHUB_ENV
          echo "DEPLOY_HOST=$DEPLOY_SERVER2_HOST" >> $GITHUB_ENV
          echo "DEPLOYMENT_REPO_PAT=$GITHUB_PAT" >> $GITHUB_ENV

      - name: Set version
        run: echo "IMAGE_VERSION=$(date +'%Y%m%d')-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build --build-arg IMAGE_VERSION=${{ env.IMAGE_VERSION }} -t $DOCKER_REGISTRY_HOST/dev/github-copilot-svcs:${{ env.IMAGE_VERSION }} .

      - name: Login to Docker Registry
        run: echo "$DOCKER_REGISTRY_PASSWORD" | docker login "$DOCKER_REGISTRY_HOST" -u "$DOCKER_REGISTRY_USER" --password-stdin

      - name: Push Docker image
        run: |
          docker tag $DOCKER_REGISTRY_HOST/dev/github-copilot-svcs:${{ env.IMAGE_VERSION }} $DOCKER_REGISTRY_HOST/dev/github-copilot-svcs:latest
          docker push $DOCKER_REGISTRY_HOST/dev/github-copilot-svcs:${{ env.IMAGE_VERSION }}
          docker push $DOCKER_REGISTRY_HOST/dev/github-copilot-svcs:latest

      - name: Checkout deployment repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOYMENT_REPO }}
          token: ${{ env.DEPLOYMENT_REPO_PAT }}
          path: deployment-repo

      - name: Update deployment files
        run: |
          sed -i "s|docker.x51.vn/dev/github-copilot-svcs:[^ ]*|docker.x51.vn/dev/github-copilot-svcs:${{ env.IMAGE_VERSION }}|g" deployment-repo/server2/docker-compose.yml
          cd deployment-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server2/docker-compose.yml
          git commit -m "ci: update github-copilot-svcs image to ${{ env.IMAGE_VERSION }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "
            cd /root/deployment/server2 &&
            git checkout master &&
            git pull origin master &&
            docker compose pull github-copilot-svcs &&
            docker compose up -d github-copilot-svcs
          "
