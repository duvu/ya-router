name: ya-router manual release

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: Build, publish, and deploy after validation
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Validate Go runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false

      - name: Verify formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l ./cmd ./internal ./src)"
          if [ -n "$unformatted" ]; then
            printf 'Files require gofmt:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...

      - name: Build compatibility, daemon, and client binaries
        run: |
          version_ldflag="-X github.com/duvu/ya-router/src.version=${{ github.sha }}"
          go build -trimpath -ldflags="-s -w ${version_ldflag}" -o /tmp/ya-router ./cmd/ya-router
          go build -trimpath -ldflags="-s -w ${version_ldflag}" -o /tmp/ya-routerd ./cmd/ya-routerd
          go build -trimpath -ldflags="-s -w ${version_ldflag}" -o /tmp/ya ./cmd/ya

  deploy:
    name: Publish and deploy
    if: ${{ inputs.deploy }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    permissions:
      contents: read
    env:
      DOCKER_REGISTRY_HOST: ${{ secrets.DOCKER_REGISTRY_HOST }}
      DOCKER_REGISTRY_USER: ${{ secrets.DOCKER_REGISTRY_USER }}
      DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      DEPLOY_USER: ${{ secrets.DEPLOY_SERVER2_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_SERVER2_HOST }}
      DEPLOYMENT_REPO_PAT: ${{ secrets.DEPLOYMENT_REPO_PAT }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOYMENT_REPO: x51vn/deployment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          for name in DOCKER_REGISTRY_HOST DOCKER_REGISTRY_USER DOCKER_REGISTRY_PASSWORD DEPLOY_USER DEPLOY_HOST DEPLOYMENT_REPO_PAT DEPLOY_KNOWN_HOSTS; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          done

      - name: Set image version
        run: echo "IMAGE_VERSION=$(date +'%Y%m%d')-${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg IMAGE_VERSION="${IMAGE_VERSION}" \
            -t "${DOCKER_REGISTRY_HOST}/dev/github-copilot-svcs:${IMAGE_VERSION}" .

      - name: Login to Docker registry
        run: echo "$DOCKER_REGISTRY_PASSWORD" | docker login "$DOCKER_REGISTRY_HOST" -u "$DOCKER_REGISTRY_USER" --password-stdin

      - name: Push Docker image
        run: |
          image="${DOCKER_REGISTRY_HOST}/dev/github-copilot-svcs:${IMAGE_VERSION}"
          latest="${DOCKER_REGISTRY_HOST}/dev/github-copilot-svcs:latest"
          docker push "$image"
          docker tag "$image" "$latest"
          docker push "$latest"

      - name: Checkout deployment repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOYMENT_REPO }}
          token: ${{ env.DEPLOYMENT_REPO_PAT }}
          path: deployment-repo

      - name: Update deployment manifest
        shell: bash
        run: |
          image="${DOCKER_REGISTRY_HOST}/dev/github-copilot-svcs:${IMAGE_VERSION}"
          sed -i "s|docker.x51.vn/dev/github-copilot-svcs:[^ ]*|${image}|g" deployment-repo/server2/docker-compose.yml
          cd deployment-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server2/docker-compose.yml
          git commit -m "ci: update ya-router image to ${IMAGE_VERSION} [skip ci]" || echo "No deployment manifest change"
          git push

      - name: Configure SSH host verification
        shell: bash
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" '
            set -e
            cd /root/deployment/server2
            git checkout master
            git pull --ff-only origin master
            docker compose pull github-copilot-svcs
            docker compose up -d github-copilot-svcs
          '
