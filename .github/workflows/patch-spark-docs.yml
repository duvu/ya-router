name: Diagnose configuration documentation patch

on:
  push:
    branches:
      - agent/spark-first-routing

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/spark-first-routing
      - name: Patch and capture diagnostics
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > doc-patch-output.txt 2>&1
          from pathlib import Path

          path = Path("docs/CONFIGURATION.md")
          text = path.read_text()

          def replace_once(old, new, label):
              global text
              print(f"checking {label}")
              if old not in text:
                  raise RuntimeError(f"missing configuration block: {label}")
              text = text.replace(old, new, 1)

          replace_once(
              "| `CODEX_HOME` | `~/.codex` | Read-only source for a legacy/single-account Codex credential import |\n| `KILO_API_KEY` | empty | Kilo Gateway API key; optional for free anonymous models |",
              "| `CODEX_HOME` | `~/.codex` | Read-only source for a legacy/single-account Codex credential import |\n| `YA_ROUTER_COOLDOWNS_PATH` | beside the managed config | Owner-only durable per-target cooldown state |\n| `KILO_API_KEY` | empty | Kilo Gateway API key; optional for free anonymous models |",
              "environment table",
          )
          replace_once('"upstream_model": "gpt-5.4"', '"upstream_model": "gpt-5.4-mini"', "model map")
          replace_once(
              "1. Exact `model_map` key.\n2. Bare `model_map` key after removing a recognized provider prefix.\n3. Explicit provider prefix.\n4. Provider catalog discovery.\n5. Configured default provider only when the request omitted the model.",
              "1. Exact `model_map` key.\n2. Bare `model_map` key after removing a recognized provider prefix.\n3. Explicit provider prefix.\n4. Exact configured virtual-model ID such as `thiendu`.\n5. Provider catalog discovery.\n6. Configured default provider only when the request omitted the model.",
              "routing order",
          )

          start_marker = "### `virtual_models` (automatic virtual models)"
          end_marker = "### `claude_aliases`"
          print("checking virtual section markers")
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          section = '''### `virtual_models` (automatic virtual models)

Virtual models expose one client-facing ID backed by an ordered list of canonical provider-prefixed targets. The proxy may try targets sequentially for one logical request, but only while no response output has been committed. Each target is attempted at most once, all attempts share the original context and deadline, and explicit provider-prefixed or `model_map` requests never enter this failover path.

Fresh configurations use the following quota-consumption chain:

```json
{
  "routing": {
    "virtual_models": {
      "thiendu": {
        "strategy": "quota_priority",
        "targets": [
          "codex/gpt-5.3-codex-spark",
          "codex/gpt-5.4-mini",
          "github/gpt-5.4-mini",
          "github/gpt-5-mini",
          "kilo/kilo-auto/free"
        ]
      }
    }
  }
}
```

Supported strategies:

- `priority`: backward-compatible behavior that may start a later request from the last successful target while it remains routable.
- `quota_priority`: always evaluates configured order. Targets in cooldown are skipped; when a higher-priority cooldown expires, the next request evaluates that target before lower-priority targets again.

Validation rules:

- The virtual model ID must be non-empty and must not collide with a provider prefix or shadow an explicit `model_map` key.
- `strategy` must be `priority` or `quota_priority`.
- Targets must be non-empty, unique, provider-prefixed, and cannot reference another virtual model.

### Quota and transient cooldowns

Cooldown state is scoped by `(provider, upstream model, capability)`, so exhausting Spark does not disable another Codex model. A quota-style response records a cooldown of at least 24 hours. A trustworthy reset later than 24 hours is honored. A short `Retry-After` on a burst `429`, generic timeout, transport failure, or `5xx` keeps the bounded short cooldown policy instead of locking a target for a full day.

The managed daemon persists bounded, redacted state to `YA_ROUTER_COOLDOWNS_PATH`, normally `cooldowns.json` beside the managed config. The file is atomic, mode `0600`, and contains no prompt, completion, credential, raw upstream body, or account identifier. Invalid advisory state is ignored with a sanitized warning.

Umbrella IDs are resolved after explicit prefixes and before ordinary provider-catalog discovery. See [Umbrella Model Routing architecture](architecture/umbrella-model-routing.md) for the full contract.

'''
          text = text[:start] + section + text[end:]
          replace_once(
              '"claude-ya-codex-gpt-5-4": "codex/gpt-5.4"',
              '"claude-ya-codex-gpt-5-4-mini": "codex/gpt-5.4-mini"',
              "Claude alias",
          )
          path.write_text(text)
          print("patch complete")
          PY
          status=$?
          echo "status=$status" >> doc-patch-output.txt
          exit 0
      - name: Commit patch or diagnostics
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/CONFIGURATION.md doc-patch-output.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'chore: capture configuration doc patch result'
          git push origin HEAD:agent/spark-first-routing
