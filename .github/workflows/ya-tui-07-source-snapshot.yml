name: YA-TUI-07 source snapshot

on:
  pull_request:
    branches:
      - agent/ya-tui-07-staging

permissions:
  contents: read
  actions: read

jobs:
  snapshot:
    if: github.head_ref == 'agent/ya-tui-07-auth'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/ya-tui-07-auth

      - name: Upload exact source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: ya-tui-07-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
