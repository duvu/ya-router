name: Diagnose YA-TUI-06 fragments

on:
  pull_request:
    branches:
      - agent/ya-tui-06-staging-validate

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/ya-tui-06-operations-cleanup'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/ya-tui-06-operations-cleanup

      - name: Record fragment sizes and hashes
        shell: bash
        run: |
          set -euo pipefail
          wc -c .tmp/ya-tui-06-overlay.part* | tee .tmp/fragment-sizes.txt
          sha256sum .tmp/ya-tui-06-overlay.part* | tee .tmp/fragment-sha256.txt

      - name: Upload exact fragments
        uses: actions/upload-artifact@v4
        with:
          name: ya-tui-06-fragments
          path: |
            .tmp/ya-tui-06-overlay.part*
            .tmp/fragment-sizes.txt
            .tmp/fragment-sha256.txt
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
