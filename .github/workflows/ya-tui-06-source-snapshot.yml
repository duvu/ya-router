name: Apply YA-TUI-06 implementation

on:
  push:
    branches:
      - agent/ya-tui-06-operations-cleanup

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/ya-tui-06-operations-cleanup
          fetch-depth: 0

      - name: Apply verified source overlay
        shell: bash
        run: |
          set -euo pipefail
          test -f .tmp/ya-tui-06-overlay.ready
          cat .tmp/ya-tui-06-overlay.part* > /tmp/ya-tui-06-overlay.b64
          test "$(wc -c < /tmp/ya-tui-06-overlay.b64)" = "42412"
          base64 --decode /tmp/ya-tui-06-overlay.b64 > /tmp/ya-tui-06-overlay.tar.gz
          echo '2fac2346ac042a146cdb9432600eaa916df0e5470ea960260756e4262592710b  /tmp/ya-tui-06-overlay.tar.gz' | sha256sum -c -
          gzip -t /tmp/ya-tui-06-overlay.tar.gz
          tar -tzf /tmp/ya-tui-06-overlay.tar.gz
          tar -xzf /tmp/ya-tui-06-overlay.tar.gz -C .
          rm -rf .tmp
          rm -f .github/workflows/ya-tui-06-source-snapshot.yml

      - name: Validate implementation
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l ./cmd ./internal ./src)"
          if [ -n "$unformatted" ]; then
            printf 'Files require gofmt:\n%s\n' "$unformatted"
            exit 1
          fi
          go vet ./...
          go test -race -count=1 ./...
          go build -trimpath -o /tmp/ya-router ./cmd/ya-router
          go build -trimpath -o /tmp/ya-routerd ./cmd/ya-routerd
          go build -trimpath -o /tmp/ya ./cmd/ya
          python - <<'PY'
          import yaml
          with open('docs/api/control-v1.openapi.yaml') as source:
              yaml.safe_load(source)
          PY

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(operations): add persistent async operations"
          git push origin HEAD:agent/ya-tui-06-operations-cleanup
