name: YA-TUI-06 source snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  snapshot:
    if: github.head_ref == 'agent/ya-tui-06-operations'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/ya-tui-06-operations

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: ya-tui-06-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
