name: Diagnose Spark-first branch

on:
  push:
    branches:
      - agent/spark-first-routing

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/spark-first-routing
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false
      - name: Capture vet output
        shell: bash
        run: |
          go vet ./... > vet-output.txt 2>&1 || true
      - name: Commit diagnostics
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add vet-output.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'chore: capture vet diagnostics'
          git push origin HEAD:agent/spark-first-routing
