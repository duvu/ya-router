name: Build Spark-first Linux release

on:
  push:
    branches:
      - agent/release-spark-first

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-spark-first
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Build verified Linux/amd64 artifacts
        shell: bash
        env:
          SOURCE_COMMIT: 512a7bb6ad93c1593443ac138a70ea7810aae842
          VERSION: 512a7bb
        run: |
          make release-linux
          cd dist/linux-amd64
          sha256sum -c checksums.txt
          grep -Fx 'source_commit=512a7bb6ad93c1593443ac138a70ea7810aae842' build-info.txt
          grep -Fx 'version=512a7bb' build-info.txt
          grep -Fx 'platform=linux/amd64' build-info.txt
      - name: Commit artifacts and remove temporary workflow
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/build-spark-first-release.yml
          git add dist/linux-amd64
          git commit -m 'build: refresh Spark-first Linux artifacts'
          git push origin HEAD:agent/release-spark-first
