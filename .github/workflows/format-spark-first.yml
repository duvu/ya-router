name: Format Spark-first branch

on:
  push:
    branches:
      - agent/spark-first-routing

permissions:
  contents: write

jobs:
  gofmt:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/spark-first-routing
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false
      - name: Apply gofmt
        run: gofmt -w ./cmd ./internal ./src
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ./cmd ./internal ./src
          git commit -m 'chore: apply gofmt'
          git push origin HEAD:agent/spark-first-routing
