name: Export current main snapshot

on:
  push:
    branches:
      - agent/current-main-snapshot

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: current-main-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
