name: Export current main snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/current-main-snapshot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: current-main-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
