name: Apply YA-TUI-05 overlay

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  apply:
    if: github.head_ref == 'agent/ya-tui-05-read-models-cleanup'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/ya-tui-05-read-models-cleanup
          fetch-depth: 0

      - name: Upload staged payload for diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ya-tui-05-overlay-parts
          path: .tmp/ya-tui-05-overlay.part*
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

      - name: Apply staged source overlay
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          cat .tmp/ya-tui-05-overlay.part* > /tmp/ya-tui-05-overlay.b64
          wc -c .tmp/ya-tui-05-overlay.part* /tmp/ya-tui-05-overlay.b64
          if ! base64 --decode /tmp/ya-tui-05-overlay.b64 > /tmp/ya-tui-05-overlay.tar.gz; then
            echo "base64 decode failed"
            exit 1
          fi
          file /tmp/ya-tui-05-overlay.tar.gz
          if ! gzip -t /tmp/ya-tui-05-overlay.tar.gz; then
            echo "gzip validation failed"
            exit 1
          fi
          tar -tzf /tmp/ya-tui-05-overlay.tar.gz
          tar -xzf /tmp/ya-tui-05-overlay.tar.gz -C .
          rm -f .tmp/ya-tui-05-overlay.part*
          rmdir .tmp 2>/dev/null || true
          rm -f .github/workflows/apply-ya-tui-05-overlay.yml

      - name: Fail on invalid overlay
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Verify formatting
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l ./cmd ./internal ./src)"
          if [ -n "$unformatted" ]; then
            printf 'Files require gofmt:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Vet
        if: steps.apply.outcome == 'success'
        run: go vet ./...

      - name: Test with race detector
        if: steps.apply.outcome == 'success'
        run: go test -race -count=1 ./...

      - name: Build binaries
        if: steps.apply.outcome == 'success'
        run: |
          go build -trimpath -o /tmp/ya-router ./cmd/ya-router
          go build -trimpath -o /tmp/ya-routerd ./cmd/ya-routerd
          go build -trimpath -o /tmp/ya ./cmd/ya

      - name: Commit applied implementation
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "feat(control): expose redacted read resources"
          git push origin HEAD:agent/ya-tui-05-read-models-cleanup
