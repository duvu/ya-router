name: Format hardening branch once

on:
  push:
    branches:
      - agent/harden-ya-router-findings
    paths:
      - .github/workflows/format-once.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    # This workflow is temporary and is removed after the formatting commit.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/harden-ya-router-findings
          fetch-depth: 0

      - name: Format Go source
        shell: bash
        run: |
          find ./src -name '*.go' -type f -print0 | xargs -0 gofmt -w

      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          if git diff --cached --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git commit -m "style: format Go hardening changes"
          git push origin HEAD:agent/harden-ya-router-findings
