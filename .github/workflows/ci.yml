name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false

      - name: Verify formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l ./src)"
          if [ -n "$unformatted" ]; then
            printf 'Files require gofmt:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./src/...

      - name: Test with race detector
        run: go test -race -count=1 ./src/...

      - name: Build
        run: go build -trimpath -o /tmp/ya-router ./src
