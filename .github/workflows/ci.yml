name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false

      - name: Format and commit when needed
        id: format
        shell: bash
        run: |
          find ./src -name '*.go' -type f -print0 | xargs -0 gofmt -w
          if git diff --quiet -- ./src; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "style: format Go hardening changes"
          git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Vet
        if: steps.format.outputs.changed != 'true'
        run: go vet ./src/...

      - name: Test with race detector
        id: race_tests
        if: steps.format.outputs.changed != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          go test -race -count=1 ./src/... 2>&1 | tee race-test.log

      - name: Upload race-test diagnostics
        if: always() && steps.format.outputs.changed != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: race-test-log
          path: race-test.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail on race-test regression
        if: steps.race_tests.outcome == 'failure'
        run: exit 1

      - name: Build
        if: steps.format.outputs.changed != 'true' && steps.race_tests.outcome == 'success'
        run: go build -trimpath -o /tmp/ya-router ./src
