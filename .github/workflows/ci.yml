name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false

      - name: Prepare typed rate-limit integration contract
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("src/integration_test.go")
          text = path.read_text()
          if '\t"errors"\n' not in text:
              text = text.replace('\t"encoding/json"\n', '\t"encoding/json"\n\t"errors"\n', 1)

          pattern = re.compile(
              r'(\terr := p\.ProxyRequest\(context\.Background\(\), w, req, \[\]byte\(`\{"model":"oc-gpt-5","messages":\[\]\}`\), CapabilityChat\)\n)'
              r'\tif err != nil \{\n'
              r'\t\tt\.Errorf\("expected no error \(should forward last 429\), got: %v", err\)\n'
              r'\t\}\n'
          )
          replacement = (
              r'\1'
              '\tvar providerErr *ProviderError\n'
              '\tif err == nil || !errors.As(err, &providerErr) || providerErr.Kind != ProviderErrorRateLimit {\n'
              '\t\tt.Errorf("expected typed rate-limit error, got: %v", err)\n'
              '\t}\n'
          )
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"expected one legacy rate-limit assertion, found {count}")
          path.write_text(text)
          PY
          gofmt -w src/integration_test.go

      - name: Upload patched integration test
        uses: actions/upload-artifact@v4
        with:
          name: patched-integration-test
          path: src/integration_test.go
          if-no-files-found: error
          retention-days: 3
