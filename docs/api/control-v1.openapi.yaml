openapi: 3.1.0
info:
  title: ya-router Control API
  version: 1.0.0
  description: 'Isolated management-plane contract for ya-routerd. The Control API does

    not accept YA_ROUTER_API_KEY and is not served from the OpenAI-compatible

    data-plane listener.

    '
servers:
- url: http://unix/control/v1
  description: Local Unix socket transport (socket path is deployment-specific)
- url: https://127.0.0.1:7443/control/v1
  description: Optional loopback TLS transport
paths:
  /meta:
    get:
      operationId: getControlMeta
      summary: Negotiate Control API and client compatibility
      description: 'Returns service version, supported Control API versions, feature flags,

        N/N-1 client compatibility, deployment mode, current configuration

        revision, and restart-required state. Unsupported clients may call this

        discovery endpoint and receive compatible=false; other resources reject

        unsupported clients before executing an operation.

        '
      security:
      - localUnixSocket: []
      - controlBearer: []
      - mutualTLS: []
      parameters:
      - $ref: '#/components/parameters/RequestID'
      - $ref: '#/components/parameters/ClientVersion'
      responses:
        '200':
          description: Control metadata and compatibility result
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
  /providers:
    get:
      operationId: listControlProviders
      summary: List all compiled-in providers
      security: &id001
      - localUnixSocket: []
      - controlBearer: []
      - mutualTLS: []
      parameters:
      - $ref: '#/components/parameters/RequestID'
      - $ref: '#/components/parameters/ClientVersion'
      responses:
        '200':
          description: Successful redacted read
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '426':
          $ref: '#/components/responses/UpgradeRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts:
    get:
      operationId: listControlAccounts
      summary: List redacted daemon-owned accounts
      security: *id001
      parameters:
      - $ref: '#/components/parameters/RequestID'
      - $ref: '#/components/parameters/ClientVersion'
      responses:
        '200':
          description: Successful redacted read
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '426':
          $ref: '#/components/responses/UpgradeRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /models:
    get:
      operationId: listControlModels
      summary: List model catalog freshness and availability
      security: *id001
      parameters:
      - $ref: '#/components/parameters/RequestID'
      - $ref: '#/components/parameters/ClientVersion'
      - name: refresh
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Successful redacted read
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelCatalogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '426':
          $ref: '#/components/responses/UpgradeRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /config:
    get:
      operationId: getControlConfig
      summary: Read redacted desired and effective configuration
      security: *id001
      parameters:
      - $ref: '#/components/parameters/RequestID'
      - $ref: '#/components/parameters/ClientVersion'
      responses:
        '200':
          description: Successful redacted read
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '426':
          $ref: '#/components/responses/UpgradeRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /operations:
    get:
      operationId: listControlOperations
      summary: List asynchronous operations
      security: *id001
      parameters:
      - $ref: '#/components/parameters/RequestID'
      - $ref: '#/components/parameters/ClientVersion'
      responses:
        '200':
          description: Successful redacted read
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '426':
          $ref: '#/components/responses/UpgradeRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /events:
    get:
      operationId: listControlEvents
      summary: Poll lifecycle events after a sequence
      security: *id001
      parameters:
      - $ref: '#/components/parameters/RequestID'
      - $ref: '#/components/parameters/ClientVersion'
      - name: after
        in: query
        required: false
        schema:
          type: integer
          format: uint64
          minimum: 0
      responses:
        '200':
          description: Successful redacted read
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '426':
          $ref: '#/components/responses/UpgradeRequired'
        '500':
          $ref: '#/components/responses/InternalError'
  /events/stream:
    get:
      operationId: streamControlEvents
      summary: Resume lifecycle events over Server-Sent Events
      security: *id001
      parameters:
      - $ref: '#/components/parameters/RequestID'
      - $ref: '#/components/parameters/ClientVersion'
      - name: Last-Event-ID
        in: header
        required: false
        schema:
          type: string
          pattern: ^[0-9]+$
      responses:
        '200':
          description: Resumable event stream
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '426':
          $ref: '#/components/responses/UpgradeRequired'
components:
  securitySchemes:
    localUnixSocket:
      type: apiKey
      in: header
      name: X-Local-Unix-Socket-Identity
      description: 'Documentation marker only. Local identity is established by Unix socket

        ownership and mode; clients do not send this header.

        '
    controlBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque-control-token
      description: 'Independent viewer/operator/admin control token. It must differ from

        YA_ROUTER_API_KEY and is allowed only for explicitly configured loopback

        TLS administration.

        '
    mutualTLS:
      type: mutualTLS
      description: 'Required for non-loopback remote administration. Verified URI SAN,

        full subject, or Common Name values map to viewer/operator/admin roles.

        '
  parameters:
    RequestID:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: Optional safe caller correlation ID. The service generates one otherwise.
    ClientVersion:
      name: X-YA-Client-Version
      in: header
      required: false
      schema:
        type: string
        examples:
        - 1.1.0
        - 1.0.0
      description: ya client semantic version used for N/N-1 negotiation.
  headers:
    RequestID:
      schema:
        type: string
      description: Correlation ID included in logs, audit, and typed errors.
  schemas:
    MetaResponse:
      type: object
      additionalProperties: false
      required:
      - service_version
      - control_api_versions
      - features
      - client_compatibility
      - deployment_mode
      - config_revision
      - restart_required
      properties:
        service_version:
          type: string
        control_api_versions:
          type: array
          items:
            type: string
          examples:
          - - v1
        features:
          type: array
          items:
            type: string
        client_compatibility:
          $ref: '#/components/schemas/ClientCompatibility'
        deployment_mode:
          type: string
          enum:
          - local
          - remote
          - local+remote
        config_revision:
          type: integer
          format: uint64
          minimum: 0
        restart_required:
          type: boolean
    ClientCompatibility:
      type: object
      additionalProperties: false
      required:
      - minimum
      - maximum
      - current
      - compatible
      properties:
        requested:
          type: string
        minimum:
          type: string
          const: 1.0.0
        maximum:
          type: string
          const: 1.1.x
        current:
          type: string
          const: 1.1.0
        compatible:
          type: boolean
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
    ErrorBody:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - retryable
      - request_id
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        request_id:
          type: string
        details:
          type: object
          additionalProperties: true
    ProviderCollection:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProviderResource'
    ProviderResource:
      type: object
      required:
      - descriptor
      - enabled
      - effective_capabilities
      - health
      - generation
      properties:
        descriptor:
          type: object
          additionalProperties: true
        enabled:
          type: boolean
        effective_capabilities:
          type: array
          items:
            type: string
        health:
          type: object
          additionalProperties: true
        generation:
          type: integer
          format: uint64
    AccountCollection:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AccountResource'
    AccountResource:
      type: object
      required:
      - provider_id
      - id
      - enabled
      - priority
      - credential
      properties:
        provider_id:
          type: string
        id:
          type: string
          description: Daemon-owned opaque account ID
        label:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer
        credential:
          $ref: '#/components/schemas/CredentialMetadata'
    CredentialMetadata:
      type: object
      required:
      - configured
      - source
      - refreshable
      properties:
        configured:
          type: boolean
        source:
          type: string
        refreshable:
          type: boolean
    ModelCatalogResponse:
      type: object
      required:
      - catalogs
      properties:
        catalogs:
          type: array
          items:
            $ref: '#/components/schemas/ProviderCatalog'
    ProviderCatalog:
      type: object
      required:
      - provider_id
      - enabled
      - available
      - models
      - stale
      properties:
        provider_id:
          type: string
        enabled:
          type: boolean
        available:
          type: boolean
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelResource'
        fetched_at:
          type: string
          format: date-time
        last_attempt_at:
          type: string
          format: date-time
        age_seconds:
          type: integer
          minimum: 0
        stale:
          type: boolean
        last_refresh_error:
          type: string
    ModelResource:
      type: object
      required:
      - id
      - upstream_id
      - provider_id
      - available
      properties:
        id:
          type: string
        upstream_id:
          type: string
        provider_id:
          type: string
        available:
          type: boolean
        owned_by:
          type: string
        supported_endpoints:
          type: array
          items:
            type: string
    ConfigResource:
      type: object
      required:
      - revision
      - digest
      - effective_digest
      - desired
      - effective
      properties:
        revision:
          type: integer
          format: uint64
        digest:
          type: string
        effective_digest:
          type: string
        restart_required:
          type: array
          items:
            type: string
        desired:
          type: object
          additionalProperties: true
          description: Redacted desired config
        effective:
          type: object
          additionalProperties: true
          description: Redacted effective config
    OperationCollection:
      type: object
      required:
      - data
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
    EventPage:
      type: object
      required:
      - data
      - next_after
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        next_after:
          type: integer
          format: uint64
  responses:
    Unauthorized:
      description: Missing, invalid, or data-plane-only credential
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated identity lacks the required role
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Sanitized internal failure
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadRequest:
      description: Invalid request or cursor
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UpgradeRequired:
      description: Client version is outside the supported N/N-1 window
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
